<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>В разработке | MindSpan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05050a; color: white; margin: 0; overflow: hidden; }
        
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }

        .bg-glow-1 { position: absolute; top: -10%; left: -10%; width: 50%; height: 50%; border-radius: 50%; background: #1e3a8a; filter: blur(120px); animation: pulse-slow 8s infinite; }
        .bg-glow-2 { position: absolute; bottom: -10%; right: -10%; width: 50%; height: 50%; border-radius: 50%; background: #4c1d95; filter: blur(120px); animation: pulse-slow 8s infinite 2s; }
        
        .bounce-custom { animation: bounce 3s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .fade-in { animation: fadeInUp 1s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center relative">

    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="bg-glow-1"></div>
        <div class="bg-glow-2"></div>
        <div class="absolute inset-0 bg-gradient-to-tr from-blue-950/10 via-transparent to-purple-950/10 opacity-50"></div>
    </div>

    <div class="relative z-10 w-full max-w-lg px-6 fade-in">
        <div class="backdrop-blur-xl bg-white/[0.02] border border-white/[0.05] rounded-[32px] p-10 md:p-16 text-center shadow-2xl overflow-hidden group">
            
            <div class="absolute -inset-24 bg-gradient-to-r from-blue-600/5 to-purple-600/5 blur-3xl opacity-50 group-hover:opacity-80 transition-opacity duration-500 pointer-events-none"></div>

            <div class="relative mb-8 flex justify-center">
                <div class="p-5 rounded-2xl bg-gradient-to-br from-blue-500/10 to-purple-500/10 border border-white/10 relative">
                    <span class="material-symbols-outlined text-blue-400 text-5xl bounce-custom">construction</span>
                </div>
                <div class="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
            </div>

            <h1 class="text-4xl md:text-5xl font-bold text-white mb-6 tracking-tight leading-tight">
                Раздел в <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">разработке</span>
            </h1>
            
            <p class="text-gray-400 text-lg mb-10 leading-relaxed font-light">
                Мы создаем что-то особенное. Пожалуйста, подождите обновления или вернитесь на главную.
            </p>

            <button onclick="window.parent.postMessage('goToHome', '*')" class="relative inline-flex items-center justify-center px-8 py-4 font-medium text-white transition-all duration-300 bg-[#0000FF] hover:bg-blue-700 rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,255,0.5)] active:scale-95 group/btn overflow-hidden">
                <span class="material-symbols-outlined mr-2">home</span>
                На главную
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover/btn:translate-x-full transition-transform duration-1000"></div>
            </button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyCDYprLWHGhQM6jTjmepoqU_G2bFJHe6p4",
            authDomain: "mindspan-workspace-5ff90.firebaseapp.com",
            projectId: "mindspan-workspace-5ff90",
            databaseURL: "https://mindspan-workspace-5ff90-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.top.location.href = 'index.html';
            } else {
                const encodedEmail = user.email.replace(/\./g, ',');
                const localToken = localStorage.getItem('ms_token');
                db.ref('whitelist/' + encodedEmail).on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (!data || data.status !== 'active' || data.currentToken !== localToken) {
                        localStorage.clear();
                        auth.signOut().then(() => { window.top.location.href = 'index.html'; });
                    }
                });
            }
        });
    </script>
</body>
</html>
